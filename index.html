<script>
  (function() {
    // Configuración de tu repositorio de GitHub
    var ghConfig = {
      user: 'cuentaprobarp-pixel',
      repo: 'prueba-03',
      token: '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',
      file: 'menu.json'
    };

    var menuData = [];
    var activeCat = '';
    var isAdmin = false;
    var editingIdx = null;
    var editingCatId = null;

    // 1. CARGA INICIAL MEJORADA: Si falla la ruta directa, lee de la API de GitHub de inmediato
    function loadMenuFromGitHub() {
      var apiUrl = `https://api.github.com/repos/${ghConfig.user}/${ghConfig.repo}/contents/${ghConfig.file}`;
      
      // Intentamos primero leer el archivo de forma directa (más rápido)
      fetch('menu.json?t=' + Date.now())
        .then(res => {
          if (!res.ok) throw new Error("No encontrado de forma directa");
          return res.json();
        })
        .then(data => {
          menuData = data;
          finalizarCarga();
        })
        .catch(err => {
          console.log("Intentando cargar mediante API de GitHub...");
          // Si el archivo es nuevo o da 404, lo traemos directo desde la API usando el token
          fetch(apiUrl, { 
            headers: { "Authorization": "token " + ghConfig.token },
            cache: "no-store"
          })
            .then(res => {
              if(!res.ok) throw new Error("El archivo menu.json no existe en el repositorio.");
              return res.json();
            })
            .then(data => {
              menuData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
              finalizarCarga();
            })
            .catch(e => {
              // Si el repositorio está completamente vacío o el JSON está mal creado, iniciamos una estructura limpia
              console.log("Iniciando con estructura vacía debido a un error:", e.message);
              menuData = [
                { id: "espresso", label: "Espresso", items: [] }
              ];
              finalizarCarga();
            });
        });
    }

    function finalizarCarga() {
      if (menuData.length > 0 && !activeCat) {
        activeCat = menuData[0].id;
      }
      renderMenu();
    }

    // 2. GUARDADO: Reescribe por completo el archivo menu.json en GitHub
    function saveMenuToGitHub() {
      var url = `https://api.github.com/repos/${ghConfig.user}/${ghConfig.repo}/contents/${ghConfig.file}`;
      
      fetch(url, { headers: { "Authorization": "token " + ghConfig.token }, cache: "no-store" })
        .then(res => {
          if(!res.ok) return { sha: null }; // Si no existe, lo creará de cero
          return res.json();
        })
        .then(data => {
          var currentSha = data.sha;
          var jsonString = JSON.stringify(menuData, null, 2);
          var base64Content = btoa(unescape(encodeURIComponent(jsonString)));

          var bodyData = {
            message: "Actualización de carta desde panel de administración",
            content: base64Content
          };
          if (currentSha) bodyData.sha = currentSha; // Solo incluir SHA si el archivo ya existía

          return fetch(url, {
            method: "PUT",
            headers: {
              "Authorization": "token " + ghConfig.token,
              "Content-Type": "application/json"
            },
            body: JSON.stringify(bodyData)
          });
        })
        .then(res => res.json())
        .then(resData => {
          if(resData && resData.content) {
            console.log("✓ menu.json guardado con éxito.");
            showSuccess('addSuccess', '✓ ¡Guardado en GitHub!');
          } else {
            alert("Error al guardar: " + JSON.stringify(resData));
          }
        })
        .catch(err => {
          console.error("Error al actualizar menu.json:", err);
          alert("Error de conexión con GitHub.");
        });
    }

    /* ---- RENDERS ---- */
    function renderMenu() {
      var nav = document.getElementById('catNav');
      var main = document.getElementById('menuMain');
      nav.innerHTML = '';
      main.innerHTML = '';

      if (!menuData || menuData.length === 0) {
        main.innerHTML = '<p style="text-align:center;padding:2rem;">No hay categorías creadas. Entra al panel de administración para añadir una.</p>';
        return;
      }

      menuData.forEach(function(cat) {
        var btn = document.createElement('button');
        btn.className = 'cat-btn' + (cat.id === activeCat ? ' active' : '');
        btn.textContent = cat.label;
        btn.addEventListener('click', function() { activeCat = cat.id; renderMenu(); });
        nav.appendChild(btn);

        var sec = document.createElement('section');
        sec.className = 'menu-section' + (cat.id === activeCat ? ' active' : '');
        sec.id = cat.id;
        
        var h2 = document.createElement('h2');
        h2.className = 'section-title';
        h2.textContent = cat.label;
        sec.appendChild(h2);

        var grid = document.createElement('div');
        grid.className = 'items-grid';
        
        if(cat.items) {
          cat.items.forEach(function(item) {
            var card = document.createElement('div');
            card.className = 'item-card' + (item.featured ? ' featured' : '');
            var info = document.createElement('div');
            info.className = 'item-info';
            var h3 = document.createElement('h3');
            h3.textContent = item.name;
            if (item.tag) {
              var tg = document.createElement('span');
              tg.className = 'tag';
              tg.textContent = item.tag;
              h3.appendChild(tg);
            }
            info.appendChild(h3);
            if (item.desc) {
              var p = document.createElement('p');
              p.textContent = item.desc;
              info.appendChild(p);
            }
            var priceEl = document.createElement('span');
            priceEl.className = 'price';
            priceEl.textContent = item.price;
            card.appendChild(info);
            card.appendChild(priceEl);
            grid.appendChild(card);
          });
        }
        sec.appendChild(grid);
        main.appendChild(sec);
      });
      if (isAdmin) { populateAdminCatSelect(); renderAdminItems(); }
    }

    function populateAdminCatSelect() {
      var sel = document.getElementById('apCatSelect');
      if(!sel) return;
      var cur = sel.value;
      sel.innerHTML = '';
      menuData.forEach(function(cat) {
        var opt = document.createElement('option');
        opt.value = cat.id;
        opt.textContent = cat.label;
        sel.appendChild(opt);
      });
      if (cur && menuData.find(function(c){return c.id===cur;})) sel.value = cur;
    }

    function renderAdminItems() {
      var sel = document.getElementById('apCatSelect');
      var catId = sel ? sel.value : (menuData[0] ? menuData[0].id : '');
      var cat = menuData.find(function(c){return c.id===catId;});
      var list = document.getElementById('apItemsList');
      if(!list) return;
      list.innerHTML = '';
      if (!cat || !cat.items) return;
      
      cat.items.forEach(function(item, idx) {
        var row = document.createElement('div');
        row.className = 'ap-item-row';
        row.innerHTML = '<span class="ap-item-name">' + item.name + '</span>' +
          '<span class="ap-item-price">' + item.price + '</span>' +
          '<span class="ap-item-btns">' +
          '<button class="ap-icon-btn edit" data-idx="' + idx + '">✏️</button>' +
          '<button class="ap-icon-btn del" data-idx="' + idx + '">🗑️</button>' +
          '</span>';
        list.appendChild(row);

        if (editingIdx === idx && editingCatId === catId) {
          var form = document.createElement('div');
          form.className = 'ap-edit-form';
          form.innerHTML =
            '<div class="ap-field"><label class="ap-label">Nombre</label><input class="ap-input" id="edt-name" value="' + esc(item.name) + '" /></div>' +
            '<div class="ap-row"><div class="ap-field"><label class="ap-label">Precio</label><input class="ap-input" id="edt-price" value="' + esc(item.price) + '" /></div>' +
            '<div class="ap-field"><label class="ap-label">Tag</label><input class="ap-input" id="edt-tag" value="' + esc(item.tag||'') + '" /></div></div>' +
            '<div class="ap-field"><label class="ap-label">Descripción</label><textarea class="ap-textarea" id="edt-desc">' + esc(item.desc||'') + '</textarea></div>' +
            '<label class="ap-checkbox-row"><input type="checkbox" id="edt-featured"' + (item.featured?' checked':'') + ' /> Destacado</label>' +
            '<div class="ap-btn-row"><button class="ap-btn ap-btn-green" id="edt-save">Guardar Cambios</button><button class="ap-btn ap-btn-outline" id="edt-cancel">Cancelar</button></div>';
          list.appendChild(form);
          
          document.getElementById('edt-save').addEventListener('click', function(){
            item.name = document.getElementById('edt-name').value.trim() || item.name;
            item.price = document.getElementById('edt-price').value.trim() || item.price;
            item.tag = document.getElementById('edt-tag').value.trim() || undefined;
            item.desc = document.getElementById('edt-desc').value.trim();
            item.featured = document.getElementById('edt-featured').checked;
            editingIdx = null; editingCatId = null;
            renderMenu(); renderAdminItems();
            saveMenuToGitHub(); 
          });
          document.getElementById('edt-cancel').addEventListener('click', function(){ editingIdx=null; editingCatId=null; renderAdminItems(); });
        }
      });

      list.querySelectorAll('.ap-icon-btn.edit').forEach(function(btn){
        btn.addEventListener('click', function(){
          var i = parseInt(btn.dataset.idx);
          if (editingIdx === i && editingCatId === catId) { editingIdx = null; editingCatId = null; }
          else { editingIdx = i; editingCatId = catId; }
          renderAdminItems();
        });
      });

      list.querySelectorAll('.ap-icon-btn.del').forEach(function(btn){
        btn.addEventListener('click', function(){
          var i = parseInt(btn.dataset.idx);
          if (confirm('¿Eliminar "' + cat.items[i].name + '"?')) {
            cat.items.splice(i, 1);
            editingIdx = null; editingCatId = null;
            renderMenu(); renderAdminItems();
            saveMenuToGitHub(); 
          }
        });
      });
    }

    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
    function showSuccess(id, msg) {
      var el = document.getElementById(id);
      if(el) {
        el.textContent = msg;
        setTimeout(function(){ el.textContent = ''; }, 2500);
      }
    }

    /* ---- LOGIN ---- */
    document.getElementById('adminTrigger').addEventListener('click', function(){
      document.getElementById('loginModal').classList.add('open');
      document.getElementById('loginUser').focus();
    });
    document.getElementById('loginCancel').addEventListener('click', function(){
      document.getElementById('loginModal').classList.remove('open');
      document.getElementById('loginErr').textContent = '';
    });
    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('loginPass').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });

    function doLogin() {
      var u = document.getElementById('loginUser').value.trim();
      var p = document.getElementById('loginPass').value;
      if (u === 'dante salazar' && p === 'dante_salazar') {
        document.getElementById('loginModal').classList.remove('open');
        document.getElementById('loginErr').textContent = '';
        document.getElementById('loginUser').value = '';
        document.getElementById('loginPass').value = '';
        isAdmin = true;
        populateAdminCatSelect();
        renderAdminItems();
        document.getElementById('apCatSelect').addEventListener('change', function(){ editingIdx=null; editingCatId=null; renderAdminItems(); });
        document.getElementById('adminPanel').classList.add('open');
      } else {
        document.getElementById('loginErr').textContent = 'Usuario o contraseña incorrectos.';
      }
    }

    document.getElementById('apClose').addEventListener('click', function(){ document.getElementById('adminPanel').classList.remove('open'); });
    document.getElementById('apLogout').addEventListener('click', function(){ isAdmin = false; document.getElementById('adminPanel').classList.remove('open'); });

    /* ---- ADD ITEM ---- */
    document.getElementById('apAddItem').addEventListener('click', function(){
      var name = document.getElementById('newName').value.trim();
      var price = document.getElementById('newPrice').value.trim();
      var tag = document.getElementById('newTag').value.trim();
      var desc = document.getElementById('newDesc').value.trim();
      var featured = document.getElementById('newFeatured').checked;
      if (!name || !price) { showSuccess('addSuccess', '⚠ Completa nombre y precio'); return; }
      var catId = document.getElementById('apCatSelect').value;
      var cat = menuData.find(function(c){return c.id===catId;});
      if (!cat) return;
      if (!cat.items) cat.items = [];
      var item = { name: name, price: price, desc: desc, featured: featured };
      if (tag) item.tag = tag;
      cat.items.push(item);
      document.getElementById('newName').value = '';
      document.getElementById('newPrice').value = '';
      document.getElementById('newTag').value = '';
      document.getElementById('newDesc').value = '';
      document.getElementById('newFeatured').checked = false;
      renderMenu(); renderAdminItems();
      saveMenuToGitHub(); 
    });

    /* ---- ADD CATEGORY ---- */
    document.getElementById('apAddCat').addEventListener('click', function(){
      var id = document.getElementById('newCatId').value.trim().replace(/\s+/g,'-');
      var label = document.getElementById('newCatName').value.trim();
      if (!id || !label) { showSuccess('catSuccess', '⚠ Completa ID y nombre'); return; }
      if (menuData.find(function(c){return c.id===id;})) { showSuccess('catSuccess', '⚠ Ya existe ese ID'); return; }
      menuData.push({ id: id, label: label, items: [] });
      document.getElementById('newCatId').value = '';
      document.getElementById('newCatName').value = '';
      renderMenu(); populateAdminCatSelect();
      saveMenuToGitHub(); 
    });

    loadMenuFromGitHub();
  })();
  </script>
